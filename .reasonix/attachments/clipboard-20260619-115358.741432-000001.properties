# =====================================================
# Application
# =====================================================
spring.application.name=medical

# =====================================================
# DeepSeek — AI Model
# =====================================================
spring.ai.deepseek.api-key=${DEEPSEEK_API_KEY:your-api-key-here}
spring.ai.deepseek.chat.model=deepseek-chat
spring.ai.deepseek.chat.temperature=0.7
spring.ai.deepseek.chat.max-tokens=4096

# =====================================================
# MySQL — Primary Database
# =====================================================
spring.datasource.url=jdbc:mysql://localhost:3306/medical_agent?useUnicode=true&characterEncoding=utf8mb4&serverTimezone=Asia/Shanghai&createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=${MYSQL_PASSWORD:root}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# =====================================================
# Flyway — Database Migration
# =====================================================
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true
spring.flyway.table=flyway_schema_history

# =====================================================
# Redis — Cache & Pub/Sub
# =====================================================
spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}
spring.data.redis.password=${REDIS_PASSWORD:}
spring.data.redis.lettuce.pool.max-active=16
spring.data.redis.lettuce.pool.max-idle=8
spring.data.redis.lettuce.pool.min-idle=4

# =====================================================
# MyBatis-Plus
# =====================================================
mybatis-plus.mapper-locations=classpath*:/mapper/**/*.xml
mybatis-plus.global-config.db-config.id-type=auto
mybatis-plus.global-config.db-config.logic-delete-field=deleted
mybatis-plus.configuration.log-impl=org.apache.ibatis.logging.stdout.StdOutImpl
mybatis-plus.configuration.map-underscore-to-camel-case=true

# =====================================================
# Agent Configuration
# =====================================================
agent.project-root=${user.dir}
agent.max-tool-timeout-seconds=30
agent.max-bash-output-chars=10240
agent.permission.ml-classifier-cache-ttl-minutes=10
agent.permission.confirm-timeout-seconds=60
agent.context.warning-threshold-pct=70
agent.context.compact-threshold-pct=85
agent.context.max-messages-load=50
agent.speculation.enabled=true
agent.speculation.debounce-ms=500
agent.speculation.cache-ttl-seconds=30
agent.kairos.heartbeat-interval-ms=30000
agent.kairos.idle-dream-threshold-minutes=5

# =====================================================
# Server
# =====================================================
server.port=8080
